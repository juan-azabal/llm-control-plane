# Secrets Detection Patterns
#
# Regex patterns for detecting credentials and secrets in prompts.
# ADR-004: Secrets detection is infrastructure, not a guardrail.
# These patterns run BEFORE all other processing, for ALL tenants.
#
# Behavior on match:
#   - Request is BLOCKED immediately
#   - Error response includes the pattern name but NEVER the matched content
#   - No data is forwarded to any model (local or cloud)
#
# Adding new patterns:
#   1. Add a new entry with name, regex, and description
#   2. Test with: bash tests/01-secrets-detection.sh
#   3. Be careful with generic patterns — false positives block legitimate work

patterns:
  - name: openai_api_key
    regex: 'sk-[a-zA-Z0-9_-]{20,}'
    description: "OpenAI API key"
    test_example: "sk-proj-abc123xyz789def456ghi012jkl345"

  - name: aws_access_key
    regex: 'AKIA[0-9A-Z]{16}'
    description: "AWS Access Key ID"
    test_example: "AKIAIOSFODNN7EXAMPLE"

  - name: rsa_private_key
    regex: '-----BEGIN (?:RSA )?PRIVATE KEY-----'
    description: "RSA/SSH Private Key"
    test_example: "-----BEGIN RSA PRIVATE KEY-----"

  - name: connection_string
    regex: '(?:postgres|mysql|mongodb|redis)://[^\s]+:[^\s]+@'
    description: "Database connection string with credentials"
    test_example: "postgres://admin:secretpass@db.example.com:5432/mydb"

  - name: jwt_token
    regex: 'eyJ[a-zA-Z0-9_-]{10,}\.eyJ[a-zA-Z0-9_-]{10,}\.[a-zA-Z0-9_-]+'
    description: "JWT token"
    test_example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIn0.dozjgNryP4J3jVmNHl0w5N_XgL0n3I9PlFUP0THsR8U"

  - name: github_pat
    regex: 'ghp_[a-zA-Z0-9]{36}'
    description: "GitHub Personal Access Token"
    test_example: "ghp_1234567890abcdefghijklmnopqrstuvwxyz"

  - name: github_fine_grained_pat
    regex: 'github_pat_[a-zA-Z0-9]{22}_[a-zA-Z0-9]{59}'
    description: "GitHub Fine-Grained Personal Access Token"
    test_example: "github_pat_11AAAAAAA0000000000000_1234567890abcdefghijklmnopqrstuvwxyz1234567890abcdefghijk"

  - name: slack_token
    regex: 'xox[baprs]-[0-9a-zA-Z-]{10,}'
    description: "Slack API token"
    test_example: "xoxb-EXAMPLE-FAKE-TOKEN-NOT-REAL"

  - name: generic_api_key_header
    regex: '(?i)(?:api[_-]?key|api[_-]?secret|auth[_-]?token|access[_-]?token|secret[_-]?key)\s*[:=]\s*["\x27]?[a-zA-Z0-9_/+=-]{20,}["\x27]?'
    description: "Generic API key assignment pattern"
    test_example: "api_key = 'abcdefghijklmnopqrstuvwxyz123456'"
